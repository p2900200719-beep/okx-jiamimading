];

async function binanceFetch(path) {
  let lastErr;
  for (const base of BINANCE_NODES) {
    try {
      const res = await fetch(base + path, { mode: 'cors' });
      if (res.ok) return res.json();
    } catch(e) { lastErr = e; }
  }
  throw lastErr || new Error('所有 Binance 节点均不可用');
}

// ─────────────────────────────────────────────
// VOLUME PROFILE ENGINE
// ─────────────────────────────────────────────
function buildVolumeProfile(klines, bins = 60) {
  if (!klines.length) return [];
  const minP = Math.min(...klines.map(k => k.low));
  const maxP = Math.max(...klines.map(k => k.high));
  const step = (maxP - minP) / bins;
  const buckets = Array.from({ length: bins }, (_, i) => ({
    priceLow:  minP + i * step,
    priceHigh: minP + (i + 1) * step,
    priceMid:  minP + (i + 0.5) * step,
    volume: 0,
  }));
  klines.forEach(k => {
    // 按K线的高低价区间均匀分配成交量（更精准）
    const lo = k.low, hi = k.high, vol = k.volume;
    const iLo = Math.max(0, Math.floor((lo - minP) / step));
    const iHi = Math.min(bins - 1, Math.floor((hi - minP) / step));
    const span = iHi - iLo + 1;
    for (let i = iLo; i <= iHi; i++) buckets[i].volume += vol / span;
  });
  const maxVol = Math.max(...buckets.map(b => b.volume));
  return buckets.map(b => ({ ...b, volPct: maxVol > 0 ? b.volume / maxVol : 0 }));
}

function detectLevels(profile, currentPrice, minGapPct = 1.5, minLevels = 6) {
  if (!profile.length) return { supports: [], resistances: [], poc: null, hvns: [], allSupports: [], allResistances: [], dataInfo: '' };

  const sorted = [...profile].sort((a, b) => b.volume - a.volume);
  const poc = sorted[0];

  // 去密函数：相邻间距 < gapPct 时合并，保留量能更强的
  function dedupe(levels, refPrice, gapPct) {
    const result = [];
    for (const lv of levels) {
      const last = result[result.length - 1];
      if (!last) { result.push(lv); continue; }
      const gap = Math.abs(lv.priceMid - last.priceMid) / refPrice * 100;
      if (gap < gapPct) {
        // 间距不足：两个节点合并，保留量能更强的那个
        if (lv.volume > last.volume) result[result.length - 1] = lv;
      } else {
        result.push(lv);
      }
    }
    return result;
  }

  // ─── 修复后的搜索逻辑 ───────────────────────────────────────
  // 策略：先用用户设定的间距(minGapPct)，逐步放宽HVN阈值(pctile)直到档位够用。
  //       只有在所有阈值都放宽完还不够档位时，才降低间距要求。
  //       这样间距始终尽量贴近用户设置，不会自动缩水到0.5%。

  const pctiles  = [0.15, 0.22, 0.30, 0.40, 0.50, 0.62, 0.75, 1.0];
  // 间距降级序列：只在所有pctile都不够时才逐步降低
  const gapFallbacks = [minGapPct, minGapPct * 0.75, minGapPct * 0.5, Math.max(minGapPct * 0.3, 0.3)];

  let supports = [], resistances = [], usedPctile = 0.15, usedGap = minGapPct;
  let found = false;

  for (const gap of gapFallbacks) {
    for (const pct of pctiles) {
      const threshold = sorted[Math.min(Math.floor(sorted.length * pct), sorted.length - 1)].volume;
      const hvns   = profile.filter(b => b.volume >= threshold);
      const rawSup = hvns.filter(b => b.priceMid < currentPrice).sort((a, b) => b.priceMid - a.priceMid);
      const rawRes = hvns.filter(b => b.priceMid > currentPrice).sort((a, b) => a.priceMid - b.priceMid);

      const s = dedupe(rawSup, currentPrice, gap);
      const r = dedupe(rawRes, currentPrice, gap);

      // 记录当前最好结果（更多档位优先）
      if (s.length + r.length > supports.length + resistances.length) {
        supports = s; resistances = r; usedPctile = pct; usedGap = gap;
      }

      // 两侧都达到目标档位数，立即停止
      if (s.length >= minLevels && r.length >= minLevels) { found = true; break; }
    }
    if (found) break;
    // 当前间距跑完所有pctile仍不够档位，才降低间距继续
  }

  const allSupports    = supports;
  const allResistances = resistances;
  const hvns = [...supports, ...resistances];

  const gapNote = usedGap < minGapPct
    ? `间距≥${usedGap.toFixed(1)}%(已降级)`
    : `间距≥${usedGap.toFixed(1)}%`;
  const dataInfo = `HVN top${(usedPctile*100).toFixed(0)}% · ${gapNote} · 支撑${supports.length}/压力${resistances.length}`;

  return { supports, resistances, poc, hvns, allSupports, allResistances, dataInfo };
}

// ─── 分档计划核心计算（保证金维度，资金安全）───────────────
// 关键约定：
//   totalCapital  = 本金（= 总可用保证金预算）
//   leverage      = 杠杆倍数（现货=1）
//   margin_i      = 第i档实际占用保证金
//   amount_i      = 名义金额 = margin_i × leverage
//   ∑ margin_i   ≤ totalCapital × maxCapitalUsePct（默认90%，留10%应急）
//   单档 margin_i ≤ totalCapital × maxSinglePct（默认35%）
function buildTierPlan(levels, currentPrice, config, direction) {
  const maxTiers       = config.maxTiers    || 5;
  const lev            = config.leverage    || 1;
  const tierMult       = config.tierMultiplier || 1.5;
  const totalCapital   = config.totalCapital   || 10000;
  const maxCapitalUse  = 0.90;   // 最多用90%本金做保证金，留余量
  const maxSinglePct   = 0.35;   // 单档保证金不超过本金35%

  const items = direction === 'long' ? levels : levels;
  const usedItems = items.slice(0, maxTiers);
  if (!usedItems.length) return [];

  // 第一步：按比例算出各档权重（倍乘递增）
  const weights = usedItems.map((_, i) => 1 + i * (tierMult - 1));
  const weightSum = weights.reduce((a, b) => a + b, 0);

  // 第二步：总可用保证金预算
  const totalMarginBudget = totalCapital * maxCapitalUse;
  // 单档保证金硬上限
  const maxSingleMargin = totalCapital * maxSinglePct;

  // 第三步：按权重分配保证金，单档超限时截断并将剩余重分配
  let margins = weights.map(w => Math.min((w / weightSum) * totalMarginBudget, maxSingleMargin));
  // 截断后可能总量变少，做一次归一化确保总量不超预算
  const marginSum = margins.reduce((a, b) => a + b, 0);
  if (marginSum > totalMarginBudget) {
    const scale = totalMarginBudget / marginSum;
    margins = margins.map(m => m * scale);
  }

  return usedItems.map((lv, i) => {
    const margin  = margins[i];          // 实际保证金
    const amount  = margin * lev;        // 名义金额（合约面值）
    const priceDiff = direction === 'long'
      ? ((currentPrice - lv.priceMid) / currentPrice * 100)
      : ((lv.priceMid - currentPrice)  / currentPrice * 100);
    const pricePct = priceDiff.toFixed(2);
    return {
      tier:           i + 1,
      direction,
      price:          lv.priceMid,
      priceFormatted: lv.priceMid.toFixed(2),
      pricePct,
      margin:         Math.round(margin),   // 实际保证金
      amount:         Math.round(amount),   // 名义金额
      volStrength:    lv.volPct,
      label:          direction === 'long' ? `-${pricePct}%` : `+${pricePct}%`,
      labelColor:     direction === 'long' ? 'text-red-500' : 'text-emerald-600',
    };
  });
}

function computeLongTiers(supports, currentPrice, config) {
  return buildTierPlan(supports, currentPrice, config, 'long');
}

function computeShortTiers(resistances, currentPrice, config) {
  return buildTierPlan(resistances, currentPrice, config, 'short');
}

// 兼容旧调用
function computeTiers(supports, currentPrice, config) {
  return computeLongTiers(supports, currentPrice, config);
}

// ─────────────────────────────────────────────
// VOLUME PROFILE CHART (custom SVG bar chart)
// ─────────────────────────────────────────────
function VolumeProfilePanel({ profile, currentPrice, supports, resistances, poc }) {
  if (!profile.length) return null;
  const maxBarWidth = 120;

  return (
    <div className="space-y-0.5 max-h-96 overflow-y-auto pr-1">
      {[...profile].reverse().map((b, i) => {
        const isSupport    = supports.some(s => Math.abs(s.priceMid - b.priceMid) < 1);
        const isResistance = resistances.some(r => Math.abs(r.priceMid - b.priceMid) < 1);
        const isPoc        = poc && Math.abs(poc.priceMid - b.priceMid) < 1;
        const isCurrent    = currentPrice >= b.priceLow && currentPrice < b.priceHigh;
        const barColor = isPoc ? '#f59e0b' : isSupport ? '#10b981' : isResistance ? '#f87171' : '#6366f1';
        const barW = Math.round(b.volPct * maxBarWidth);

        return (
          <div key={i} className={`flex items-center gap-1 ${isCurrent ? 'opacity-100' : 'opacity-80'}`}>
            <span className="text-[9px] text-slate-400 w-16 text-right font-mono flex-shrink-0">
              {b.priceMid.toFixed(0)}
            </span>
            <div className="flex-1 relative h-4 flex items-center">
              <div className="vp-bar h-3 rounded-sm flex-shrink-0"
                style={{ width: barW, background: barColor, minWidth: 2, opacity: isPoc ? 1 : 0.7 + b.volPct * 0.3 }}>
              </div>
              {isCurrent && (
                <div className="absolute left-0 right-0 flex items-center" style={{ left: barW + 4 }}>
                  <span className="text-[9px] font-bold text-indigo-600 whitespace-nowrap">◄ 当前</span>
                </div>
              )}
            </div>
            <div className="w-6 flex-shrink-0">
              {isPoc        && <span className="tier-badge bg-amber-100 text-amber-700">POC</span>}
              {isSupport && !isPoc && <span className="tier-badge bg-emerald-100 text-emerald-700">支</span>}
              {isResistance && !isPoc && <span className="tier-badge bg-red-100 text-red-700">压</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function StrategyDashboard({ userCode, strategy, onBack, syncStatus, setSyncStatus }) {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [klines,    setKlines]    = useState([]);   // 图表K线
  const [vpKlines,  setVpKlines]  = useState([]);   // VP专用K线（独立周期）
  const [vpLoading, setVpLoading] = useState(false);
  const [ticker,    setTicker]    = useState(null);
  const [stats24h,  setStats24h]  = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState('');
  const [trades,    setTrades]    = useState([]);
  const [tradesLoaded, setTradesLoaded] = useState(false);
  const [interval,  setIntervalVal] = useState('1h');
  const [vpPeriod,  setVpPeriod]  = useState('日内'); // VP周期
  const [showAddTrade, setShowAddTrade] = useState(false);
  const [addTradeForm, setAddTradeForm] = useState({ type: 'buy', direction: 'long', price: '', usdt: '', note: '', tier: 1 });
  const [showSqlHint, setShowSqlHint] = useState(false);
  // ── AI 回测优化 state ──
  const [aiRunning,    setAiRunning]    = useState(false);
  const [aiProgress,   setAiProgress]   = useState(0);      // 0-100
  const [aiResult,     setAiResult]     = useState(null);   // 优化结果
  const [aiRange,      setAiRange]      = useState('3m');   // 回测区间
  const [aiApplied,    setAiApplied]    = useState(false);  // 是否已应用
  // 策略方向: 'long' | 'short'
  const [direction, setDirection] = useState(() => (strategy.config?.direction || 'long'));
  // 杠杆倍数 (1 = 现货/无杠杆)
  const [leverage, setLeverage] = useState(() => (strategy.config?.leverage || 1));

  const config = strategy.config || {};
  const symbol = strategy.symbol;

  // 加载图表K线 + 行情（随图表周期变化）
  const loadMarket = useCallback(async () => {
    setLoading(true); setError('');
    try {
      const [k, t, s] = await Promise.all([
        fetchMultiKlines(symbol, interval),
        fetchTicker(symbol),
        fetch24hStats(symbol),
      ]);
      setKlines(k); setTicker(t); setStats24h(s);
    } catch (e) {
      setError('获取行情失败：' + e.message);
    } finally { setLoading(false); }
  }, [symbol, interval]);

  // 独立加载 VP 专用K线（随 vpPeriod 变化）
  const loadVpKlines = useCallback(async () => {
    setVpLoading(true);
    try {
      const k = await fetchVpKlines(symbol, vpPeriod);
      setVpKlines(k);
    } catch (e) {
      setError('VP数据加载失败：' + e.message);
    } finally { setVpLoading(false); }
  }, [symbol, vpPeriod]);

  useEffect(() => { loadMarket(); }, [loadMarket]);
  useEffect(() => { loadVpKlines(); }, [loadVpKlines]);

  // Auto-refresh every 30s
  useEffect(() => {
    const id = setInterval(async () => {
      try { setTicker(await fetchTicker(symbol)); } catch {}
    }, 30000);
    return () => clearInterval(id);
  }, [symbol]);

  // Load trades
  useEffect(() => {
    (async () => {
      try { setTrades(await db.getTrades(strategy.id)); }
      catch (e) { console.error(e); }
      setTradesLoaded(true);
    })();
  }, [strategy.id]);

  // ---- Volume Profile & Levels（纯净：只用 vpKlines，不混合图表K线）----
  const profile = useMemo(() => buildVolumeProfile(vpKlines.length ? vpKlines : klines, 80), [vpKlines, klines]);
  const levels  = useMemo(() => detectLevels(profile, ticker || 0, config.minGapPct || 2.0, config.maxTiers || 5), [profile, ticker, config.minGapPct, config.maxTiers]);
  const vpCfg   = VP_CONFIGS[vpPeriod] || VP_CONFIGS['日内'];
  // 把运行时 leverage 合并进 config 传给计算函数
  const configWithLev = useMemo(() => ({ ...config, leverage }), [config, leverage]);
  const longTiers  = useMemo(() => computeLongTiers(levels.supports,    ticker || 0, configWithLev), [levels.supports,    ticker, configWithLev]);
  const shortTiers = useMemo(() => computeShortTiers(levels.resistances, ticker || 0, configWithLev), [levels.resistances, ticker, configWithLev]);
  const tiers = direction === 'long' ? longTiers : shortTiers;

  // ---- Portfolio stats (支持做多/做空) ----
  const portfolioStats = useMemo(() => {
    if (!trades.length || !ticker) return null;
    // 做多统计
    let longUsdt = 0, longQty = 0, longRealized = 0;
    // 做空统计 (short_open=卖空开仓 short_close=买回平仓)
    let shortUsdt = 0, shortQty = 0, shortRealized = 0;

    [...trades].sort((a, b) => new Date(a.executed_at) - new Date(b.executed_at)).forEach(t => {
      if (t.direction === 'short') {
        if (t.type === 'sell') { // 开空
          shortUsdt += t.usdt; shortQty += t.qty;
        } else { // 平空(买回)
          const avgOpen = shortQty > 0 ? shortUsdt / shortQty : 0;
          shortRealized += (avgOpen - t.price) * t.qty; // 做空盈利 = 开仓均价 - 平仓价
          shortQty  -= t.qty;
          shortUsdt -= t.qty * avgOpen;
        }
      } else { // 做多
        if (t.type === 'buy') {
          longUsdt += t.usdt; longQty += t.qty;
        } else {
          const avgCost = longQty > 0 ? longUsdt / longQty : 0;
          longRealized += (t.price - avgCost) * t.qty;
          longQty  -= t.qty;
          longUsdt -= t.qty * avgCost;
        }
      }
    });

    // 当前方向的统计
    const isShort = direction === 'short';
    const holdQty    = isShort ? shortQty  : longQty;
    const holdUsdt   = isShort ? shortUsdt : longUsdt;
    const realized   = isShort ? shortRealized : longRealized;
    const avgCost    = holdQty > 0 ? holdUsdt / holdQty : 0;
    // 做多：持仓市值 = qty * 当前价; 做空：盈亏方向相反
    const mktValue      = holdQty * ticker;
    const unrealizedPnl = isShort
      ? (avgCost - ticker) * holdQty   // 做空：开仓价 > 当前价 = 盈
      : mktValue - holdUsdt;           // 做多：当前价 > 成本 = 盈
    const usedCapital = (holdUsdt / (config.totalCapital || 1)) * 100;
    // 强平价估算（简化公式，仅供参考，实际以交易所为准）
    // 做多强平价 ≈ avgCost × (1 - 1/leverage + maintenanceMargin/leverage)
    const mm = 0.005; // 维持保证金率 0.5%（保守估计）
    const lev = leverage || 1;
    const liqPrice = isShort
      ? (holdQty > 0 ? avgCost * (1 + 1/lev - mm/lev) : null)
      : (holdQty > 0 ? avgCost * (1 - 1/lev + mm/lev) : null);
    return { holdQty, avgCost, mktValue, holdUsdt, realizedPnl: realized, unrealizedPnl, usedCapital, isShort, liqPrice };
  }, [trades, ticker, config, direction, leverage]);

  // ---- Add trade ----
  const handleAddTrade = async () => {
    const price = parseFloat(addTradeForm.price);
    const usdt  = parseFloat(addTradeForm.usdt);
    if (!price || !usdt) { alert('请填写价格和金额'); return; }
    const qty = usdt / price;
    const trade = {
      id:          Date.now().toString(),
      strategy_id: strategy.id,
      type:        addTradeForm.type,
      direction:   addTradeForm.direction || direction,
      price, qty, usdt,
      tier:        parseInt(addTradeForm.tier) || 1,
      note:        addTradeForm.note,
      executed_at: new Date().toISOString(),
    };
    setSyncStatus('syncing');
    try {
      await db.insertTrade(trade);
      setTrades(prev => [trade, ...prev]);
      setSyncStatus('ok');
      setShowAddTrade(false);
      setAddTradeForm({ type: 'buy', direction: 'long', price: '', usdt: '', note: '', tier: 1 });
    } catch (e) {
      setSyncStatus('err');
      alert('保存失败：' + e.message);
    }
  };

  const handleDeleteTrade = async (id) => {
    if (!window.confirm('确认删除这笔交易？')) return;
    setSyncStatus('syncing');
    try {
      await db.deleteTrade(id);
      setTrades(prev => prev.filter(t => t.id !== id));
      setSyncStatus('ok');
    } catch (e) { setSyncStatus('err'); alert('删除失败'); }
  };

  // ---- Price change color ----
  const changeColor = stats24h?.change >= 0 ? 'text-emerald-600' : 'text-red-500';
  const changeSign  = stats24h?.change >= 0 ? '+' : '';

  // ---- Next action signal (做多/做空双向) ----
  const signal = useMemo(() => {
    if (!ticker || !tiers.length) return null;
    const nearTier = tiers.find(t => Math.abs((ticker - t.price) / ticker) < 0.012);
    if (direction === 'long') {
      if (nearTier) return {
        tradeType: 'buy', tier: nearTier.tier, price: nearTier.price, amount: nearTier.amount,
        title: `🟢 做多买入信号 — 第 ${nearTier.tier} 档`,
        reason: `价格接近支撑位 $${nearTier.price.toFixed(0)}（成交量密集区），建议左侧分批建多仓`,
        btnColor: 'success', btnLabel: '记录买入',
      };
      // 多头止盈：接近压力位
      const nearRes = levels.resistances[0];
      if (nearRes && Math.abs((ticker - nearRes.priceMid) / ticker) < 0.015 && portfolioStats?.holdQty > 0) {
        return { tradeType: 'sell', price: nearRes.priceMid, amount: null,
          title: '🔴 止盈信号 — 接近压力位',
          reason: `价格接近压力位 $${nearRes.priceMid.toFixed(0)}，建议分批卖出锁利`,
          btnColor: 'danger', btnLabel: '记录卖出',
        };
      }
    } else { // short
      if (nearTier) return {
        tradeType: 'sell', tier: nearTier.tier, price: nearTier.price, amount: nearTier.amount,
        title: `🔴 做空开仓信号 — 第 ${nearTier.tier} 档`,
        reason: `价格接近压力位 $${nearTier.price.toFixed(0)}（成交量密集区），建议左侧分批建空仓`,
        btnColor: 'danger', btnLabel: '记录做空',
      };
      // 空头止盈：接近支撑位
      const nearSup = levels.supports[0];
      if (nearSup && Math.abs((ticker - nearSup.priceMid) / ticker) < 0.015 && portfolioStats?.holdQty > 0) {
        return { tradeType: 'buy', price: nearSup.priceMid, amount: null,
          title: '🟢 止盈信号 — 接近支撑位',
          reason: `价格接近支撑位 $${nearSup.priceMid.toFixed(0)}，建议买回平仓锁利`,
          btnColor: 'success', btnLabel: '记录平空',
        };
      }
    }
    return null;
  }, [ticker, tiers, levels, portfolioStats, direction]);

  // ══════════════════════════════════════════════════════
  // AI 回测引擎
  // ══════════════════════════════════════════════════════

  // 单次参数组合回测
  // 模拟马丁策略在历史K线上的表现
  const runBacktest = useCallback((backtestKlines, params) => {
    const { maxTiers, tierMultiplier, minGapPct, dir } = params;
    const capital = config.totalCapital || 10000;
    const isShort = dir === 'short';

    let cash = capital;
    let position = 0;   // 持仓量
    let costBasis = 0;  // 持仓成本总额
    let realized = 0;
    let maxDrawdown = 0;
    let peakValue = capital;
    let trades = 0;
    let wins = 0;

    // 用前60%的K线建VP，在后40%上模拟交易（避免未来函数）
    const splitIdx = Math.floor(backtestKlines.length * 0.6);
    const vpKlines  = backtestKlines.slice(0, splitIdx);
    const simKlines = backtestKlines.slice(splitIdx);

    if (vpKlines.length < 20 || simKlines.length < 10) return null;

    // 建立 Volume Profile
    const prof = buildVolumeProfile(vpKlines, 60);
    const firstClose = simKlines[0].close;
    const lvls = detectLevels(prof, firstClose, minGapPct, maxTiers);
    const levels = isShort ? lvls.resistances : lvls.supports;

    if (levels.length < 2) return null;

    // 计算每档价格
    const capitalPerTier = capital / maxTiers;
    const tierPrices = levels.slice(0, maxTiers).map((lv, i) => ({
      price: lv.priceMid,
      amount: Math.min(capitalPerTier * (1 + i * (tierMultiplier - 1)), capital * 0.4),
      triggered: false,
    }));

    // 止盈目标：做多→回到第一个压力位，做空→回到第一个支撑位
    const tpLevel = isShort ? lvls.supports[0] : lvls.resistances[0];
    const tpPrice = tpLevel ? tpLevel.priceMid : null;

    // 模拟逐K线
    for (const k of simKlines) {
      const price = k.close;
      const totalValue = cash + (isShort
        ? realized + (position > 0 ? (costBasis/position - price) * position : 0)
        : position * price + cash);

      // 计算回撤
      if (totalValue > peakValue) peakValue = totalValue;
      const dd = (peakValue - totalValue) / peakValue;
      if (dd > maxDrawdown) maxDrawdown = dd;

      // 熔断：回撤超60%停止
      if (maxDrawdown > 0.6) break;

      // 检查买入/开空触发（做多：低于档位价 / 做空：高于档位价）
      for (const tier of tierPrices) {
        if (tier.triggered) continue;
        const triggered = isShort ? price >= tier.price : price <= tier.price;
        if (triggered && cash >= tier.amount) {
          const qty = tier.amount / price;
          if (isShort) {
            // 开空：记录开仓
            position  += qty;
            costBasis += tier.amount;
          } else {
            // 做多：买入
            position  += qty;
            costBasis += tier.amount;
            cash      -= tier.amount;
          }
          tier.triggered = true;
          trades++;
        }
      }

      // 检查止盈
      if (position > 0 && tpPrice) {
        const tpTriggered = isShort ? price <= tpPrice : price >= tpPrice;
        if (tpTriggered) {
          if (isShort) {
            const avgOpen = costBasis / position;
            realized += (avgOpen - price) * position;
          } else {
            realized += position * price - costBasis;
            cash     += position * price;
          }
          if (realized > 0) wins++;
          // 重置
          position = 0; costBasis = 0;
          // 重置档位触发状态
          tierPrices.forEach(t => t.triggered = false);
          trades++;
        }
      }
    }

    // 最终清算（按最后收盘价）
    const lastPrice = simKlines[simKlines.length - 1].close;
    let finalPnl = realized;
    if (position > 0) {
      if (isShort) finalPnl += (costBasis / position - lastPrice) * position;
      else         finalPnl += position * lastPrice - costBasis;
    }

    const roi = (finalPnl / capital) * 100;
    const winRate = trades > 0 ? (wins / Math.max(trades/2, 1)) * 100 : 0;
    const score = roi - maxDrawdown * 50; // 综合评分：收益 - 回撤惩罚

    return { roi, finalPnl, maxDrawdown: maxDrawdown * 100, trades, winRate, score, params };
  }, [config, direction]);

  // AI 参数搜索主函数
  const runAiOptimize = useCallback(async () => {
    if (klines.length < 50) { alert('数据不足，请先刷新行情'); return; }
    setAiRunning(true); setAiProgress(0); setAiResult(null); setAiApplied(false);

    // 选取回测数据
    const now = Date.now();
    const rangeMs = { '1m': 30, '3m': 90, '6m': 180, '1y': 365 };
    const days = rangeMs[aiRange] || 90;
    const cutoff = now - days * 86400000;
    const btKlines = klines.filter(k => k.time >= cutoff);
    if (btKlines.length < 30) { alert('所选时段数据不足，请切换更大时间周期或延长回测区间'); setAiRunning(false); return; }

    // 参数搜索空间
    const maxTiersCandidates   = [3, 4, 5, 6, 7];
    const tierMultCandidates   = [1.0, 1.3, 1.5, 1.8, 2.0, 2.5];
    const minGapCandidates     = [0.8, 1.2, 1.8, 2.5, 3.5];
    const dirCandidates        = ['long', 'short'];

    const total = maxTiersCandidates.length * tierMultCandidates.length * minGapCandidates.length * dirCandidates.length;
    let done = 0;
    const results = [];

    // 分批执行，每批后让 UI 刷新
    const batches = [];
    for (const dir of dirCandidates)
      for (const maxTiers of maxTiersCandidates)
        for (const tierMultiplier of tierMultCandidates)
          for (const minGapPct of minGapCandidates)
            batches.push({ dir, maxTiers, tierMultiplier, minGapPct });

    const batchSize = 10;
    for (let i = 0; i < batches.length; i += batchSize) {
      const chunk = batches.slice(i, i + batchSize);
      await new Promise(resolve => setTimeout(resolve, 0)); // yield to UI
      for (const params of chunk) {
        const r = runBacktest(btKlines, params);
        if (r && isFinite(r.score)) results.push(r);
        done++;
      }
      setAiProgress(Math.round((done / total) * 100));
    }

    if (!results.length) { alert('回测无有效结果，请检查数据'); setAiRunning(false); return; }

    // 排序：综合评分最高
    results.sort((a, b) => b.score - a.score);
    const top10 = results.slice(0, 10);
    const best  = results[0];

    setAiResult({ best, top10, total, btKlines, btDays: days });
    setAiRunning(false);
    setAiProgress(100);
  }, [klines, aiRange, runBacktest]);

// STRATEGY LIST
// ─────────────────────────────────────────────
function StrategyList({ userCode, onSelect }) {
  const [strategies, setStrategies] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ symbol: 'BTCUSDT', totalCapital: '10000', maxTiers: '5', tierMultiplier: '1.5', direction: 'long', minGapPct: '2.0', leverage: '1' });

  useEffect(() => {
    (async () => {
      try { setStrategies(await db.getStrategies(userCode)); }
      catch (e) { console.error(e); }
      setLoading(false);
    })();
  }, [userCode]);

  const handleAdd = async () => {
    const sym = form.symbol.trim().toUpperCase();
    if (!sym) { alert('请输入交易对'); return; }
    const strategy = {
      id: Date.now().toString(),
      user_code: userCode,
      symbol: sym,
      config: {
        totalCapital:   parseFloat(form.totalCapital) || 10000,
        maxTiers:       parseInt(form.maxTiers) || 5,
        tierMultiplier: parseFloat(form.tierMultiplier) || 1.5,
        direction:      form.direction || 'long',
        minGapPct:      parseFloat(form.minGapPct) || 2.0,
        leverage:       parseInt(form.leverage) || 1,
      },
      status: 'active',
    };
    try {
      await db.upsertStrategy(userCode, strategy);
      setStrategies(prev => [strategy, ...prev]);
      setShowAdd(false);
    } catch (e) { alert('创建失败：' + e.message); }
  };

  const handleDelete = async (e, id) => {
    e.stopPropagation();
    if (!window.confirm('确认删除此策略及所有交易记录？')) return;
    await db.deleteStrategy(id);
    setStrategies(prev => prev.filter(s => s.id !== id));
  };

  const PAIRS = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'DOGEUSDT'];

  return (
    <div className="space-y-4">
      <div className="flex justify-between items-center">
        <h2 className="font-black text-lg text-slate-800 flex items-center gap-2"><Icon name="Layers" size={20} className="text-indigo-500"/>我的策略</h2>
        <Btn onClick={() => setShowAdd(true)}><Icon name="PlusCircle" size={15}/>新建策略</Btn>
      </div>

      {loading && <div className="text-center py-12 text-slate-400"><Icon name="RefreshCw" size={24} className="animate-spin mx-auto"/></div>}

      {!loading && strategies.length === 0 && (
        <div className="text-center py-16 text-slate-400">
          <Icon name="Target" size={48} className="mx-auto mb-4 opacity-20"/>
          <p className="font-medium">还没有策略</p>
          <p className="text-sm mt-1">点击「新建策略」添加 BTC / ETH 等交易对</p>
        </div>
      )}

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {strategies.map(s => (
          <div key={s.id} className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 cursor-pointer hover:border-indigo-300 hover:shadow-md transition-all group"
            onClick={() => onSelect(s)}>
            <div className="flex justify-between items-start">
              <div className="flex items-center gap-2">
                <div className="w-9 h-9 bg-gradient-to-br from-orange-400 to-indigo-500 rounded-xl flex items-center justify-center text-white font-black text-xs shadow-sm">
                  {s.symbol.replace('USDT','').slice(0,3)}
                </div>
                <div>
                  <div className="font-bold text-slate-800">{s.symbol}</div>
                  <div className="text-xs text-slate-400">${(s.config?.totalCapital || 0).toLocaleString()} · {s.config?.maxTiers || 5}档 · <span className={s.config?.direction === 'short' ? 'text-red-500' : 'text-emerald-600'}>{s.config?.direction === 'short' ? '▼空' : '▲多'}</span>{(s.config?.leverage||1) > 1 && <span className="text-orange-500 ml-1">{s.config.leverage}x</span>}</div>
                </div>
              </div>
              <button onClick={e => handleDelete(e, s.id)} className="text-slate-200 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                <Icon name="Trash2" size={15}/>
              </button>
            </div>
            <div className="mt-3 text-xs text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity">点击进入策略 →</div>
          </div>
        ))}
      </div>

      {showAdd && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
            <div className="flex justify-between items-center mb-5">
              <h3 className="font-bold text-slate-800">新建策略</h3>
              <button onClick={() => setShowAdd(false)}><Icon name="X" size={18} className="text-slate-400"/></button>
            </div>
            <div className="space-y-4">
              <div>
                <label className="text-xs font-medium text-slate-500 block mb-2">交易对</label>
                <div className="grid grid-cols-3 gap-2">
                  {PAIRS.map(p => (
                    <button key={p} onClick={() => setForm(f => ({ ...f, symbol: p }))}
                      className={`py-2 text-xs rounded-lg border font-semibold transition-all ${form.symbol === p ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-slate-200 text-slate-500'}`}>{p.replace('USDT','')}</button>
                  ))}
                </div>
                <input className="w-full mt-2 px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500"
                  value={form.symbol} onChange={e => setForm(f => ({ ...f, symbol: e.target.value.toUpperCase() }))} placeholder="自定义如 SOLUSDT" />
              </div>
              <Field label="总本金 (USDT)" value={form.totalCapital} onChange={v => setForm(f => ({ ...f, totalCapital: v }))} type="number" suffix="U" />
              <div>
                <label className="text-xs font-medium text-slate-500 block mb-2">策略方向</label>
                <div className="flex rounded-lg border border-slate-200 overflow-hidden text-sm font-semibold">
                  <button onClick={() => setForm(f => ({ ...f, direction: 'long' }))}
                    className={`flex-1 py-2.5 transition-all ${form.direction === 'long' ? 'bg-emerald-500 text-white' : 'bg-white text-slate-500'}`}>
                    ▲ 做多
                  </button>
                  <button onClick={() => setForm(f => ({ ...f, direction: 'short' }))}
                    className={`flex-1 py-2.5 transition-all border-l ${form.direction === 'short' ? 'bg-red-500 text-white' : 'bg-white text-slate-500'}`}>
                    ▼ 做空
                  </button>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="最大加仓档位" value={form.maxTiers} onChange={v => setForm(f => ({ ...f, maxTiers: v }))} type="number" />
                <Field label="档位倍数" value={form.tierMultiplier} onChange={v => setForm(f => ({ ...f, tierMultiplier: v }))} type="number" suffix="x" />
              </div>
              <Field label="档位最小间距 (% 去密)" value={form.minGapPct} onChange={v => setForm(f => ({ ...f, minGapPct: v }))} type="number" suffix="%" />
              <div>
                <label className="text-xs font-medium text-slate-500 block mb-2">杠杆倍数</label>
                <div className="flex gap-2 flex-wrap">
                  {[1,2,3,5,10,20].map(lv => (
                    <button key={lv} onClick={() => setForm(f => ({ ...f, leverage: String(lv) }))}
                      className={`px-3 py-2 text-xs rounded-lg border font-bold transition-all flex-1 ${String(form.leverage) === String(lv) ? (lv >= 10 ? 'bg-red-500 text-white border-red-500' : lv >= 5 ? 'bg-orange-500 text-white border-orange-500' : 'bg-indigo-600 text-white border-indigo-600') : 'border-slate-200 text-slate-500'}`}>
                      <div className="leading-tight text-center">{lv === 1 ? '现货' : '合约'}</div>
                      <div className="leading-tight text-center">{lv === 1 ? '1x' : `${lv}x`}</div>
                    </button>
                  ))}
                </div>
                {parseInt(form.leverage) > 1 && (
                  <p className="text-xs text-orange-600 mt-1.5">⚠ {form.leverage}x 杠杆：保证金率 {(100/parseInt(form.leverage)).toFixed(1)}%，请控制仓位风险</p>
                )}
              </div>
              <div className="text-xs text-slate-400 bg-slate-50 rounded-lg p-3 leading-relaxed">
                <b>档位倍数</b>：递增系数，例如1.5 → 首档$1000、次档$1500……<br/>
                <b>最小间距</b>：建议2%~5%，系统会自动放宽确保档位数量足够。<br/>
                <b>做空</b>：在压力位分批开空，在支撑位止盈平仓。
              </div>
              <div className="flex gap-2">
                <Btn variant="secondary" className="flex-1" onClick={() => setShowAdd(false)}>取消</Btn>
                <Btn className="flex-1" onClick={handleAdd}>创建</Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

              </button>
            )}
            <div className="w-7 h-7 bg-gradient-to-br from-orange-400 to-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-xs">₿</div>
            <span className="font-black text-slate-800 text-sm">加密马丁</span>
            {activeStrategy && <><span className="text-slate-300 text-xs">·</span><span className="text-indigo-600 font-bold text-sm">{activeStrategy.symbol}</span></>}
          </div>
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-1.5 text-xs text-slate-400">
              <span className={`sync-dot ${syncStatus}`}/>
              {syncStatus === 'syncing' ? '同步中' : syncStatus === 'ok' ? '已同步' : '同步失败'}
            </div>
            <button onClick={() => setDarkMode(d => !d)} className="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
              <Icon name={darkMode ? 'Sun' : 'Moon'} size={16}/>
            </button>
            <button onClick={() => { setUserCode(null); setActiveStrategy(null); }} className="text-xs text-slate-400 hover:text-red-500 flex items-center gap-1 px-2 py-1 rounded hover:bg-red-50 transition-colors">
              <Icon name="LogOut" size={13}/>退出
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-6">
        {activeStrategy
          ? <StrategyDashboard
              userCode={userCode}
              strategy={activeStrategy}
              onBack={() => setActiveStrategy(null)}
              syncStatus={syncStatus}
              setSyncStatus={setSyncStatus}
            />
          : <StrategyList userCode={userCode} onSelect={s => setActiveStrategy(s)} />
        }
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
